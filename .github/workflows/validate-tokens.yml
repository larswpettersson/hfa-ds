name: Validate tokens.json

on:
  push:
    paths:
      - "tokens.json"
      - "scripts/build/**"
  pull_request:
    paths:
      - "tokens.json"
      - "scripts/build/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run validate
      - run: npm run build:penpot
